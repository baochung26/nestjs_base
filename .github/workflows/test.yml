name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  unit-and-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage threshold
        run: npm run test:ci

      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand
