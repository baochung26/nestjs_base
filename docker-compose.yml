# Quy ước port mapping (đọc từ .env):
#   *_HOST_PORT = port trên máy host (bên trái HOST:CONTAINER), dùng khi truy cập từ browser/redis-cli/pgAdmin
#   Bên phải (5432, 6379, 3000, 80) = port trong container (cố định, không đổi)
services:
  postgres:
    image: postgres:15-alpine
    container_name: nestjs_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nestjs_db}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      nestjs_network:
        aliases:
          - postgres
          - nestjs_postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nestjs_redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      nestjs_network:
        aliases:
          - redis
          - nestjs_redis
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nestjs_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      # Host:Container — pgAdmin lắng nghe 80 trong container
      - "${PGADMIN_HOST_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - nestjs_network
    depends_on:
      - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: nestjs_app
    restart: always
    ports:
      # Host:Container — App luôn lắng nghe 3000 trong container
      - "${APP_HOST_PORT:-3001}:3000"
    environment:
      NODE_ENV: development
      # Ghi đè giá trị từ .env. Dùng tên container để tránh ENOTFOUND (một số môi trường DNS resolve container name ổn hơn).
      PORT: 3000
      DB_HOST: nestjs_postgres
      DB_PORT: 5432
      REDIS_HOST: nestjs_redis
      REDIS_PORT: 6379
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-nestjs_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nestjs_network
    command: npm run start:dev

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  nestjs_network:
    driver: bridge
